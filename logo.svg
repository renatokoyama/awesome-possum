<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <!-- Background circle -->
    <circle cx="30" cy="30" r="28" fill="#2C5F2D" stroke="#97BC62" stroke-width="2"/>
    
    <!-- Possum silhouette -->
    <!-- Body -->
    <ellipse cx="30" cy="32" rx="10" ry="12" fill="#F5F5DC"/>
    
    <!-- Head -->
    <circle cx="30" cy="20" r="8" fill="#F5F5DC"/>
    
    <!-- Ears -->
    <ellipse cx="25" cy="14" rx="3" ry="4" fill="#F5F5DC"/>
    <ellipse cx="35" cy="14" rx="3" ry="4" fill="#F5F5DC"/>
    
    <!-- Inner ears -->
    <ellipse cx="25" cy="15" rx="1.5" ry="2" fill="#DEB887"/>
    <ellipse cx="35" cy="15" rx="1.5" ry="2" fill="#DEB887"/>
    
    <!-- Eyes -->
    <circle cx="27" cy="20" r="1.5" fill="#2C1810"/>
    <circle cx="33" cy="20" r="1.5" fill="#2C1810"/>
    
    <!-- Nose -->
    <circle cx="30" cy="23" r="1" fill="#2C1810"/>
    
    <!-- Bushy tail -->
    <path d="M 30 40 Q 28 45, 25 48 Q 23 49, 24 46 Q 26 45, 30 40" 
          fill="#DEB887" opacity="0.8"/>
    
    <!-- Front paws -->
    <ellipse cx="25" cy="40" rx="2" ry="3" fill="#F5F5DC"/>
    <ellipse cx="35" cy="40" rx="2" ry="3" fill="#F5F5DC"/>
</svg>
